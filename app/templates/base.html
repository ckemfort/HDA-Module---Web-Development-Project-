<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Purrrfect Match{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .nav-dot { width:10px; height:10px; border-radius:2px; display:inline-block; margin-right:8px; }
    .hero-title { font-weight:800; letter-spacing:.5px; }
    .card-img-top { height: 210px; object-fit: cover; }
    .editorial-img { width: 120px; height: 180px; object-fit: cover; }
    .footer-links a { text-decoration: none; font-weight: 600; }
    .object-fit-cover { object-fit: cover; }
    .img-cover { width:100%; height:100%; object-fit:cover; }
    .section-card { background: #fbf3e6; border: 0; }
    .traits-grid { row-gap: .75rem; }
    .trait-row{ display: grid; grid-template-columns: 1fr auto; align-items: center;column-gap: 1rem; }
    .trait-label{ font-weight: 600; }
    .rating-dots { display: inline-flex; gap: 6px; }
    .dot{ width: 12px; height: 12px; border-radius: 999px; background: #dbe7ef; }
    .dot.filled { background: #86b65b; }
  </style>
</head>

<body class="bg-white">

  {% include "partials/navbar.html" %}

  {% block content %}{% endblock %}

  {% include "partials/footer.html" %}

</body>
</html>
